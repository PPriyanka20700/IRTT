version: 0.2

phases:
  install:
    runtime-versions:
      php: 8.1
    commands:
      - echo "Installing dependencies (if any)"
      - php -v

  pre_build:
    commands:
      - echo "Preparing build environment"

  build:
    commands:
      - echo "Validating PHP files..."
      - find . -name "*.php" -exec php -l {} \;

  post_build:
    commands:
      - echo "Build completed successfully"

artifacts:
  files:
    - '**/*'
  discard-paths: no
