version: 0.1

component: build

timeoutInSeconds: 600

shell: bash

steps:
  - type: Command
    name: "Install Step"
    command: |
      echo "Installing dependencies"
      php -v || echo "PHP not installed"

  - type: Command
    name: "Build Step"
    command: |
      echo "Running build"
      ls -la
      find . -name "*.php" -exec php -l {} \;

  - type: Command
    name: "Post Build"
    command: |
      echo "Build completed successfully"

artifacts:
  - name: output
    type: archive
    location: .
