version: 0.1

component: build

timeoutInSeconds: 600

shell: bash

phases:
  install:
    commands:
      - echo "Install phase started"

  build:
    commands:
      - echo "OCI DevOps build started"
      - ls -la
      - find . -name "*.php" -exec php -l {} \;

  post_build:
    commands:
      - echo "Build completed"

artifacts:
  files:
    - '**/*'
