version: 0.1

component: build

timeoutInSeconds: 600

shell: bash

steps:
  - type: Command
    name: "Install"
    command: |
      echo "Installing environment"
      php -v || echo "PHP not installed"

  - type: Command
    name: "Build"
    command: |
      echo "Running build"
      ls -la
      find . -name "*.php" -exec php -l {} \;

  - type: Command
    name: "Post Build"
    command: |
      echo "Build completed successfully"
